<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>打印预览</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f5;
      }

      .toolbar {
        height: 48px;
        padding: 0 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: #001529;
        color: #fff;
      }

      .toolbar__title {
        flex: 1;
        font-size: 14px;
        font-weight: 600;
      }

      .toolbar button {
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }

      .toolbar button.primary {
        background: #1677ff;
        color: #fff;
      }

      .toolbar button.secondary {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }

      .viewer {
        height: calc(100% - 48px);
        padding: 12px;
      }

      embed {
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="toolbar__title">打印预览</div>
      <!-- <button class="primary" id="btn-print" type="button">打印…</button> -->
      <button class="secondary" id="btn-close" type="button">关闭</button>
    </div>
    <div class="viewer">
      <embed id="pdf" type="application/pdf" />
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const src = params.get('src');
      if (src) {
        document.getElementById('pdf').src = src;
      }

      document.getElementById('btn-close').addEventListener('click', () => {
        window.previewAPI.close();
      });

      document.getElementById('btn-print').addEventListener('click', () => {
        window.previewAPI.print();
      });
    </script>
  </body>
</html>
